<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
         <stop offset="0%" stop-color="#050505" />
         <stop offset="100%" stop-color="#121212" />
       </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#D4AF37" />
    <stop offset="50%" stop-color="#EEDC82" />
    <stop offset="100%" stop-color="#D4AF37" />
  </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Outer luxury border -->
  <rect x="15" y="15" width="770" height="570" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.45"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,4"/>

  <!-- Geometric Abstract Shapes -->
  
      <!-- Elegant flowing wave lines -->
      <path d="M-100,300 C200,200 300,400 800,150 L800,600 L-100,600 Z" fill="url(#gold)" opacity="0.04"/>
      <path d="M0,400 C300,200 400,500 900,300 L900,600 L0,600 Z" fill="url(#gold)" opacity="0.08"/>
      <path d="M50,450 C350,300 450,550 950,350" stroke="url(#gold)" stroke-width="1.5" fill="none" opacity="0.3"/>
      <path d="M100,480 C400,350 500,580 1000,380" stroke="url(#gold)" stroke-width="0.75" fill="none" opacity="0.2"/>
    

  <!-- Brand Heading -->
  <text x="50%" y="15%" dominant-baseline="middle" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="14" fill="#D4AF37" letter-spacing="8" opacity="0.75">MACBELLO</text>
  <text x="50%" y="18%" dominant-baseline="middle" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#F5F5F0" letter-spacing="4" opacity="0.4">FAMILY SALON</text>

  <!-- Section Title -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-size="36" font-weight="300" fill="#F5F5F0" letter-spacing="2">Sleek Blowout</text>
  
  <!-- Category Tag -->
  <rect x="340" y="50%" width="120" height="22" fill="none" stroke="url(#gold)" stroke-width="0.75" opacity="0.6"/>
  <text x="50%" y="52%" dominant-baseline="middle" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" font-weight="500" fill="#EEDC82" letter-spacing="3" opacity="0.9">STYLING</text>
  
  <!-- Subtitle -->
  <text x="50%" y="62%" dominant-baseline="middle" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" font-weight="300" fill="#F5F5F0" letter-spacing="1" opacity="0.5">Ultra-smooth thermal nourishing blowout</text>
  
  <!-- Bottom Corner Accents -->
  <path d="M 35,35 L 35,50 M 35,35 L 50,35" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
  <path d="M 765,35 L 765,50 M 765,35 L 750,35" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
  <path d="M 35,565 L 35,550 M 35,565 L 50,565" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
  <path d="M 765,565 L 765,550 M 765,565 L 750,565" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>
</svg>